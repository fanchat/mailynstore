<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精拾 · 手机隐私体检</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container" id="app">

    <!-- ═══ 首页 ═══ -->
    <div id="page-home" class="page active">
      <div class="hero-icon">🛡️</div>
      <h1 class="hero-title">您的手机，<br><span class="highlight">还干净吗？</span></h1>
      <p class="hero-desc">有些App在偷偷看您的短信、在后台跑流量、在弹广告骚扰您。<br>花两分钟，给手机做个体检。</p>
      <div class="hero-features">
        <div class="feature-item">📱 检查权限风险</div>
        <div class="feature-item">🔔 识别骚扰来源</div>
        <div class="feature-item">📊 生成隐私报告</div>
        <div class="feature-item">📧 报告发到邮箱</div>
      </div>
      <button class="btn-primary" onclick="startWizard()">开始体检 →</button>
      <p class="hero-note">全程不上传您的手机数据 · 免费</p>
    </div>

    <!-- ═══ 向导 ═══ -->
    <div id="page-wizard" class="page">
      <div class="wizard-header">
        <div class="step-dots" id="stepDots"></div>
        <div class="step-counter" id="stepCounter">1 / 5</div>
      </div>
      <div class="wizard-body" id="wizardBody">
        <!-- Steps rendered by JS -->
      </div>
      <div class="wizard-footer">
        <button class="btn-secondary" id="btnPrev" onclick="prevStep()" style="visibility:hidden">← 上一步</button>
        <button class="btn-primary" id="btnNext" onclick="nextStep()">下一步 →</button>
      </div>
    </div>

    <!-- ═══ 报告 ═══ -->
    <div id="page-report" class="page">
      <div class="report-header">
        <div class="report-icon">📋</div>
        <h2>您的手机隐私体检报告</h2>
        <p class="report-subtitle">精拾 · 为您的数字生活把关</p>
      </div>
      <div class="report-body" id="reportBody">
        <!-- Report generated by JS -->
      </div>
      <div class="report-email-section">
        <h3>📧 发送到您的邮箱，永久保存</h3>
        <p>我们不留存任何数据，报告完完全全属于您。</p>
        <div class="email-form">
          <input type="email" id="emailInput" placeholder="输入您的邮箱地址" required>
          <button class="btn-primary" onclick="sendReport()" id="sendBtn">发送报告</button>
        </div>
        <div id="sendStatus" class="send-status"></div>
        <p class="email-note">不会用于其他用途 · 一次发送 · 不存留</p>
      </div>
      <div class="report-donate">
        <p>🤝 如果对您有帮助，可以请我们喝杯咖啡</p>
        <div class="donate-qr">（捐赠二维码位置）</div>
      </div>
      <button class="btn-secondary" onclick="resetAll()">重新体检</button>
    </div>

  </div>

  <script src="/script.js"></script>
</body>
</html>
